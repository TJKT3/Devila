<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME TO HOTSPOT DEVILA</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a0b2a, #3c1a44, #5c1a5c);
            height: 100vh;
            overflow: hidden;
            color: white;
            position: relative;
        }

        /* Efek bintang */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('ss.jpg');
            opacity: 0.3;
            animation: moveStars 60s linear infinite;
        }

        @keyframes moveStars {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 1000px 1000px;
            }
        }

        /* Card login */
        .main {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 0, 0, 0.65);
            border-radius: 15px;
            padding: 30px;
            width: 340px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(255, 0, 150, 0.5);
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        h1 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #ff4da6;
            text-shadow: 0 0 12px #ff4da6;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }

        button,
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(to right, #ff4da6, #ff1a75);
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover,
        input[type="submit"]:hover {
            background: linear-gradient(to right, #ff1a75, #ff4da6);
        }

        .error {
            color: #ff6666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 12px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <!-- Form MikroTik hidden untuk CHAP login -->
    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>

    <script src="/md5.js"></script>
    <script>
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }
    </script>
    $(endif)

    <div class="main">
        <h1>🌌 WELCOME TO HOTSPOT DEVILA</h1>

        <div class="error">$(if error)$(error)$(endif)</div>

        <form name="login" action="$(link-login-only)" method="post" $(if chap-id) onsubmit="return doLogin()" $(endif)>
            <input type="hidden" name="dst" value="$(link-orig)">
            <input type="hidden" name="popup" value="true">

            <input type="text" name="username" placeholder="Username" value="$(username)" required>
            <input type="password" name="password" placeholder="Password" required>

            <input type="submit" value="Connect" onclick="this.value='Menghubungkan...'">
        </form>

        <div class="footer">
            © 2026 DEVILA WIFI PRO | Powered by MikroTik RouterOS
        </div>
    </div>

</body>

</html>
